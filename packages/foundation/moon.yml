$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

tasks:
  build:
    script: 'vite build && tsc --emitDeclarationOnly'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
      - 'vite.config.ts'
    outputs:
      - 'dist'

  test:
    command: 'vitest --run'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
      - 'vite.config.ts'

  test-watch:
    command: 'vitest'
    inputs:
      - 'src/**/*'
    preset: 'server'
