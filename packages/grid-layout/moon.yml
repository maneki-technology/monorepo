$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

tasks:
  build:
    script: 'tsc && vite build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
      - 'vite.config.ts'
    outputs:
      - 'dist'

  test:
    command: 'vitest --run'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
      - 'vite.config.ts'

  test-watch:
    command: 'vitest'
    inputs:
      - 'src/**/*'
    preset: 'server'

  test-visual:
    command: 'playwright test'
    inputs:
      - 'src/**/*'
      - 'e2e/**/*'
      - 'playwright.config.ts'
    deps:
      - '~:build'

  test-visual-update:
    command: 'playwright test --update-snapshots'
    inputs:
      - 'src/**/*'
      - 'e2e/**/*'
      - 'playwright.config.ts'

  dev:
    command: 'vite'
    preset: 'server'
